services:
  # Official Temporal Dev Server & Web UI (Port 7233 & 8080)
  temporal:
    image: temporalio/admin-tools:latest
    container_name: order-supervisor-temporal
    ports:
      - "7233:7233"
      - "8080:8080"
    command: ["temporal", "server", "start-dev", "--ip", "0.0.0.0", "--ui-port", "8080"]

  # FastAPI Backend Server (Port 8000)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: order-supervisor-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - path: backend/.env
        required: false
      - path: .env
        required: false
    environment:
      - TEMPORAL_HOST=${TEMPORAL_HOST:-temporal:7233}
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-default}
      - TEMPORAL_TASK_QUEUE=${TEMPORAL_TASK_QUEUE:-order-supervisor-queue}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-openrouter/free}
      - DEBUG=${DEBUG:-false}
    depends_on:
      - temporal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["uv", "run", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

  # Temporal Worker
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: order-supervisor-worker
    restart: unless-stopped
    env_file:
      - path: backend/.env
        required: false
      - path: .env
        required: false
    environment:
      - TEMPORAL_HOST=${TEMPORAL_HOST:-temporal:7233}
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-default}
      - TEMPORAL_TASK_QUEUE=${TEMPORAL_TASK_QUEUE:-order-supervisor-queue}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-openrouter/free}
      - DEBUG=${DEBUG:-false}
    depends_on:
      - temporal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["uv", "run", "python", "-m", "app.temporal.worker"]

  # Next.js Frontend (Port 3000)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: order-supervisor-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - backend
